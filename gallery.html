<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Southern Reign Baseball</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="gallery.css" />
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">Southern Reign</a>
      <ul>
        <li><a href="index.html#about">About</a></li>
        <li><a href="roster.html">Roster</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="sponsors.html">Sponsors</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="container">
      <h1>Photo Gallery</h1>
      <p>Game Day Moments &bull; Practice &bull; Tournaments</p>
    </div>
  </div>

  <!-- GALLERY -->
  <section class="section section-light">
    <div class="container">
      <p class="section-intro" id="galleryIntro">Loading photos&hellip;</p>

      <div class="gallery-grid" id="galleryGrid"></div>
    </div>
  </section>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-prev" id="lightboxPrev">&#8249;</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="" />
    <button class="lightbox-next" id="lightboxNext">&#8250;</button>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <img src="assets/logo.jpg" alt="Southern Reign Baseball" class="footer-logo" />
      <p>&copy; 2026 Southern Reign Baseball &bull; Spring Hill, Tennessee</p>
      <p>SouthernReignBaseball@gmail.com</p>
    </div>
  </footer>

  <script>
    const DRIVE_FOLDER_ID = '1x-sN78rp3dFqZZcCFRF6e5w7DS5oets6';
    const DRIVE_API_KEY = 'AIzaSyDyB8Ow41a3o7h2sHSi8NQq_yrJhmMPJS0';

    const galleryGrid = document.getElementById('galleryGrid');
    const galleryIntro = document.getElementById('galleryIntro');

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    let imgs = [];
    let current = 0;

    function openLightbox() {
      lightboxImg.src = imgs[current].src;
      lightboxImg.alt = imgs[current].alt;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightboxPrev').addEventListener('click', () => { current = (current - 1 + imgs.length) % imgs.length; openLightbox(); });
    document.getElementById('lightboxNext').addEventListener('click', () => { current = (current + 1) % imgs.length; openLightbox(); });
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') { current = (current - 1 + imgs.length) % imgs.length; openLightbox(); }
      if (e.key === 'ArrowRight') { current = (current + 1) % imgs.length; openLightbox(); }
    });

    async function loadGallery() {
      const url = `https://www.googleapis.com/drive/v3/files?q='${DRIVE_FOLDER_ID}'+in+parents+and+mimeType+contains+'image/'+and+trashed=false&orderBy=createdTime+desc&fields=files(id,name)&key=${DRIVE_API_KEY}`;

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('Drive API request failed');
        const data = await res.json();
        const files = data.files || [];

        if (files.length === 0) {
          galleryIntro.textContent = 'Photos coming soon! Check back after our first tournament.';
          return;
        }

        galleryIntro.textContent = 'Game day moments from the Southern Reign family.';

        files.forEach(file => {
          const img = document.createElement('img');
          img.src = `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${DRIVE_API_KEY}`;
          img.alt = file.name;
          img.loading = 'lazy';
          galleryGrid.appendChild(img);
        });

        imgs = Array.from(galleryGrid.querySelectorAll('img'));
        imgs.forEach((img, i) => {
          img.style.cursor = 'pointer';
          img.addEventListener('click', () => { current = i; openLightbox(); });
        });
      } catch (err) {
        galleryIntro.textContent = 'Photos coming soon! Check back after our first tournament.';
        console.error('Gallery load failed:', err);
      }
    }

    loadGallery();
  </script>

</body>
</html>
